<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DGL Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>

<body>

    <div class="top-bar">

        <h2>DGL Dashboard</h2>
        <h2 id="welcomeUser"></h2>
        <div class="profile">
            <img src="https://i.pravatar.cc/40">
            <button onclick="logout()">Logout</button>
        </div>

    </div>


    <div class="dashboard">

        <h1>Today's Learning Goals</h1>
        <h3 id="streak">🔥 Streak: 0 days</h3>

        <div class="task-input">

            <input type="text" id="taskInput" placeholder="Add a new learning goal">

            <select id="category">
                <option value="Study">Study</option>
                <option value="Fitness">Fitness</option>
                <option value="Personal">Personal</option>
            </select>

            <select id="priority">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>

            <button onclick="addTask()">Add Task</button>

        </div>

        <div class="progress-section">
            <div id="progressBar"></div>
        </div>

        <div id="taskList"></div>


        
        <div class="chart-container">
            <h3>Weekly Progress</h3>
            <canvas id="weeklyChart"></canvas>
        </div>
        <button onclick="sendWeeklyReport()">Send Weekly Report</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
